playbook_name: Linux Full Reconnaissance
target_os: linux
description: Complete Linux system enumeration - runs from Kali against Ubuntu Server

techniques:

  - name: Current User Identity
    mitre_id: T1033
    type: shell_command
    parameters:
      command: "id && whoami"

  - name: Hostname & OS Info
    mitre_id: T1082
    type: shell_command
    parameters:
      command: "uname -a && hostname && cat /etc/os-release 2>/dev/null | head -5"

  - name: System Uptime
    mitre_id: T1082
    type: shell_command
    parameters:
      command: "uptime"

  - name: Network Interfaces
    mitre_id: T1016
    type: shell_command
    parameters:
      command: "ip addr show 2>/dev/null || ifconfig 2>/dev/null"

  - name: Routing Table
    mitre_id: T1016
    type: shell_command
    parameters:
      command: "ip route 2>/dev/null || route -n 2>/dev/null"

  - name: Active Network Connections
    mitre_id: T1049
    type: network_scan
    parameters:
      target: localhost

  - name: Running Processes
    mitre_id: T1057
    type: process_enum

  - name: Local User Accounts
    mitre_id: T1087
    type: user_enum

  - name: Sudo Privileges
    mitre_id: T1548
    type: shell_command
    parameters:
      command: "sudo -l 2>/dev/null || echo '[no sudo access]'"

  - name: SUID Binaries
    mitre_id: T1548
    type: shell_command
    parameters:
      command: "find / -perm -u=s -type f 2>/dev/null | head -15"

  - name: World-Writable Directories
    mitre_id: T1083
    type: shell_command
    parameters:
      command: "find /tmp /var /home -writable -type d 2>/dev/null | head -10"

  - name: Cron Jobs
    mitre_id: T1053
    type: shell_command
    parameters:
      command: "crontab -l 2>/dev/null; ls -la /etc/cron* 2>/dev/null | head -10"

  - name: SSH Keys Present
    mitre_id: T1552
    type: shell_command
    parameters:
      command: "find /home /root -name 'authorized_keys' -o -name 'id_rsa' 2>/dev/null"

  - name: Environment Variables
    mitre_id: T1552
    type: shell_command
    parameters:
      command: "env | grep -i 'pass\\|key\\|secret\\|token' 2>/dev/null || echo '[nothing found]'"

  - name: Write Test File (Persistence Sim)
    mitre_id: T1565
    type: file_modification
    parameters:
      file: /tmp/.sentinel_red_test
      content: "sentinel-red probe 2025"
